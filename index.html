<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            margin: 20px 0;
        }
        .features {
            display: flex;
            justify-content: space-around;
        }
        .feature {
            background-color: #e7f1ff;
            border: 1px solid #007bff;
            padding: 15px;
            border-radius: 5px;
            width: 30%;
            text-align: center;
        }
        .cta {
            text-align: center;
            margin-top: 20px;
        }
        .cta button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Shop</h1>
        <p>Your One-Stop Shop for Everything!</p>
    </header>
    <section>
        <h2>About Us</h2>
        <p>At My Shop, we offer a wide range of products to meet all your needs.</p>
    </section>
    <section>
        <h2>Features</h2>
        <div class="features">
            <div class="feature">
                <h3>Quality Products</h3>
                <p>Quality products at great prices.</p>
            </div>
            <div class="feature">
                <h3>Fast Shipping</h3>
                <p>Fast and reliable shipping.</p>
            </div>
            <div class="feature">
                <h3>Customer Service</h3>
                <p>Exceptional customer service.</p>
            </div>
        </div>
    </section>
    <div class="cta">
        <button>Shop Now</button>
    </div>
</body>
</html>
